<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>SAM Finance - LitVM DEX</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Roboto Mono', monospace;
    background: #000;
}
</style>
</head>

<body class="text-[#e5e7eb]">

<!-- HEADER -->
<header class="w-full bg-[#050505] border-b border-[#151515] px-4 py-3 flex justify-between items-center">

    <div class="font-bold text-white">
        SAM <span class="text-yellow-400">FINANCE</span>
    </div>

    <button id="connectBtn"
        class="bg-[#111] border border-yellow-400 text-yellow-400 px-4 py-2 rounded-lg text-xs"
        onclick="connectWallet()">

        CONNECT

    </button>

</header>

<!-- MAIN -->
<main class="w-full max-w-lg mx-auto p-4 mt-5">

    <!-- SWAP BOX -->
    <section class="space-y-4">

        <div class="bg-[#070709] border border-zinc-800 p-4 rounded-xl">

            <div class="flex justify-between text-xs text-zinc-400 mb-2">
                <span>From</span>
                <span>SAMFI</span>
            </div>

            <input id="inputAmount" type="number"
                class="w-full bg-black border border-zinc-800 p-3 rounded text-right text-xl"
                placeholder="0" />

            <div id="tokenABalance" class="text-xs text-zinc-500 mt-2">
                0 SAMFI Balance
            </div>

        </div>

        <div class="text-center text-yellow-400">⇅</div>

        <div class="bg-[#070709] border border-zinc-800 p-4 rounded-xl">

            <div class="flex justify-between text-xs text-zinc-400 mb-2">
                <span>To</span>
                <span>zkLTC</span>
            </div>

            <input disabled
                class="w-full bg-black border border-zinc-800 p-3 rounded text-right text-xl"
                placeholder="0" />

            <div id="tokenBBalance" class="text-xs text-zinc-500 mt-2">
                0 zkLTC Balance
            </div>

        </div>

        <!-- BUTTON -->
        <button onclick="executeSwap()"
            class="w-full py-4 rounded-xl bg-gradient-to-r from-yellow-500 to-yellow-600 text-black font-bold">

            SWAP

        </button>

        <!-- LOG -->
        <div id="logConsole"
            class="hidden bg-[#050505] border border-zinc-800 p-3 rounded-xl text-xs mt-4 h-28 overflow-y-auto">

            [SYSTEM READY]

        </div>

    </section>

</main>

<script>

let signer;

const SAMFI = "0xAC9E151b4048b179Be0CbB23C0c6FC29419061a7";
const LP    = "0xbd5588aF3470B6bEbD969B82497c2a0F54168DD5";

async function connectWallet() {

    if (!window.ethereum) {
        alert("Install wallet dulu");
        return;
    }

    const provider = new ethers.BrowserProvider(window.ethereum);
    signer = await provider.getSigner();

    const addr = await signer.getAddress();

    document.getElementById("connectBtn").innerText =
        addr.slice(0,6) + "..." + addr.slice(-4);
}

async function executeSwap() {

    if (!signer) {
        alert("Connect wallet dulu");
        return;
    }

    const amount = document.getElementById("inputAmount").value;
    const log = document.getElementById("logConsole");

    log.classList.remove("hidden");

    if (!amount || amount <= 0) {
        alert("Input amount");
        return;
    }

    try {

        log.innerHTML += "<br>[1] Approving SAMFI...";

        const erc20 = new ethers.Contract(SAMFI, [
            "function approve(address spender,uint amount) returns(bool)"
        ], signer);

        const tx1 = await erc20.approve(LP, ethers.parseEther(amount.toString()));
        await tx1.wait();

        log.innerHTML += "<br>[2] Approved";

        log.innerHTML += "<br>[3] Executing swap...";

        const lp = new ethers.Contract(LP, [
            "function swap(uint amount0Out,uint amount1Out,address to)"
        ], signer);

        const user = await signer.getAddress();

        const tx2 = await lp.swap(
            0,
            ethers.parseEther(amount.toString()),
            user
        );

        await tx2.wait();

        log.innerHTML += "<br>✅ SWAP SUCCESS ON-CHAIN";

    } catch (err) {

        console.log(err);

        log.innerHTML += "<br>❌ SWAP FAILED (LP butuh router / tidak direct swap)";
    }
}

</script>

</body>
</html>
