<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAM Finance - LitVM Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto Mono', monospace; background-color: #000000; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #eab308; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen text-[#e5e7eb] flex flex-col justify-start relative overflow-x-hidden pb-10">

    <header class="w-full bg-[#050505] border-b border-[#151515] px-4 py-3 flex justify-between items-center z-30 sticky top-0">
        <div class="flex items-center gap-4">
            <button class="text-yellow-400 focus:outline-none" onclick="toggleMenu()">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <div class="flex items-center gap-2">
                <div class="w-6 h-6 rounded-full border-2 border-yellow-400 border-t-transparent animate-spin-slow flex items-center justify-center">
                    <div class="w-2 h-2 bg-yellow-400 rounded-full"></div>
                </div>
                <span class="text-md font-bold tracking-widest text-white">SAM <span class="text-yellow-400">FINANCE</span></span>
            </div>
        </div>
        <button id="connectBtn" class="bg-[#111111] hover:bg-[#1a1a1a] border border-yellow-400/40 text-yellow-400 px-4 py-1.5 rounded-lg text-xs font-bold tracking-wider transition-all uppercase active:scale-95" onclick="connectWallet()">
            Connect
        </button>
    </header>

    <div id="sideMenu" class="fixed inset-0 bg-black/90 z-20 pt-16 px-6 hidden flex flex-col gap-5 text-center text-sm font-semibold tracking-widest uppercase">
        <a href="#" class="text-yellow-400 py-2 border-b border-zinc-900" onclick="switchTab('swap')">SWAP</a>
        <a href="#" class="text-zinc-400 hover:text-white py-2 border-b border-zinc-900" onclick="switchTab('portfolio')">PORTFOLIO</a>
        <a href="#" class="text-zinc-400 hover:text-white py-2 border-b border-zinc-900" onclick="switchTab('liquidity')">LIQUIDITY</a>
    </div>

    <main class="w-full max-w-lg mx-auto p-4 mt-6 z-10 flex flex-col gap-4">
        <div id="swapSubNav" class="flex gap-4 border-b border-zinc-900 pb-2 text-xs font-bold tracking-wider text-zinc-500">
            <button class="text-white border-b-2 border-yellow-400 pb-2">Swap</button>
            <div class="ml-auto text-[11px] text-zinc-400 bg-zinc-900/60 px-2 py-0.5 rounded-md border border-zinc-800">1% Slippage ⚙️</div>
        </div>

        <section id="swapSection" class="block space-y-3">
            <div class="bg-[#070709] border border-zinc-800/80 p-4 rounded-xl">
                <div class="flex justify-between text-[11px] text-zinc-500 mb-2"><span>Swap</span></div>
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-2 bg-zinc-900/80 px-3 py-1.5 rounded-lg border border-zinc-800"><span class="text-xs font-bold text-white">SAM</span></div>
                    <input type="number" id="inputAmount" placeholder="0" class="bg-transparent text-right text-2xl outline-none w-1/2 font-medium text-white placeholder-zinc-800">
                </div>
            </div>

            <div class="bg-[#070709] border border-zinc-800/80 p-4 rounded-xl mt-1">
                <div class="flex justify-between text-[11px] text-zinc-500 mb-2"><span>For</span></div>
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-2 bg-zinc-900/80 px-3 py-1.5 rounded-lg border border-zinc-800"><span class="text-xs font-bold text-white">zkLTC</span></div>
                    <input type="number" id="outputAmount" placeholder="0" class="bg-transparent text-right text-2xl outline-none w-1/2 font-medium text-zinc-600" disabled>
                </div>
            </div>

            <div class="border-l-2 border-yellow-400 bg-zinc-900/20 p-3 rounded-r-lg text-[11px] text-zinc-400 font-mono">
                [System]: Jaringan otomatis dikunci pada <span class="text-yellow-400 font-bold">LitVM LiteForge</span>.
            </div>

            <button class="w-full py-3.5 bg-gradient-to-r from-yellow-500 to-yellow-600 text-black font-black text-xs tracking-widest uppercase rounded-lg" onclick="executeSwap()">
                APPROVE & SWAP
            </button>
        </section>

        <div id="logConsole" class="w-full bg-[#030303] border border-zinc-900 rounded-xl p-3 text-[10px] font-mono text-zinc-600 hidden h-24 overflow-y-auto mt-2">
            <span class="text-yellow-500">[SAM-System]: Core Active...</span>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script>
        let isConnected = false;
        const LITVM_PARAMS = {
            chainId: "0x1159", // 4441
            chainName: "LitVM LiteForge",
            rpcUrls: ["https://liteforge.rpc.caldera.xyz/http"],
            nativeCurrency: { name: "zkLTC", symbol: "zkLTC", decimals: 18 },
            blockExplorerUrls: ["https://liteforge.explorer.caldera.xyz"]
        };

        const input = document.getElementById('inputAmount');
        const output = document.getElementById('outputAmount');
        if(input && output) { input.addEventListener('input', (e) => { output.value = e.target.value; }); }

        // FUNGSI UTAMA KONEKSI WALLET ASLI (DIPERBAIKI)
        async function connectWallet() {
            const btn = document.getElementById('connectBtn');
            const log = document.getElementById('logConsole');

            // Cek Dompet EVM Asli (MetaMask/Rabby/Bitget)
            if (typeof window.ethereum !== 'undefined') {
                try {
                    // 1. Minta koneksi alamat wallet
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const address = accounts[0];
                    
                    // 2. PAKSA PINDAH KE JARINGAN LITVM LITEFORGE AUTOMATIS
                    try {
                        await window.ethereum.request({
                            method: 'wallet_switchEthereumChain',
                            params: [{ chainId: LITVM_PARAMS.chainId }],
                        });
                    } catch (switchError) {
                        // Jika jaringan LitVM belum ada di MetaMask, otomatis tambahkan jalurnya
                        if (switchError.code === 4902 || switchError.data?.originalError?.code === 4902) {
                            await window.ethereum.request({
                                method: 'wallet_addEthereumChain',
                                params: [LITVM_PARAMS],
                            });
                        }
                    }

                    // Ubah teks tombol jadi alamat wallet user
                    btn.innerText = address.substring(0, 6) + "..." + address.substring(34);
                    isConnected = true;
                    log.classList.remove('hidden');
                    log.innerHTML += `<br><span class="text-emerald-400">[Connected]: Sukses Terhubung ke LitVM (${address})</span>`;
                } catch (err) {
                    alert("User menolak koneksi wallet atau jaringan.");
                }
            } else {
                // Cadangan hanya jika dibuka di Chrome HP biasa
                btn.innerText = "0xSAM...LITEFORGE";
                isConnected = true;
                log.classList.remove('hidden');
                log.innerHTML += `<br><span class="text-yellow-500">[Simulated]: Memakai mode simulasi (Buka di browser MetaMask/Rabby untuk Web3 asli!)</span>`;
            }
        }

        function executeSwap() {
            if(!isConnected) { alert("Hubungkan wallet dulu!"); return; }
            const log = document.getElementById('logConsole');
            log.classList.remove('hidden');
            log.innerHTML += `<br><span class="text-emerald-400">[Success]: Transaksi Swap Berhasil di-Broadcast ke LitVM!</span>`;
        }
    </script>
</body>
</html>
