<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>SAM Finance - SAMFI DEX</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Roboto Mono', monospace;
    background: #000;
}
</style>
</head>

<body class="text-white">

<header class="p-4 border-b border-zinc-800 flex justify-between">
    <div class="font-bold text-yellow-400">SAM FINANCE</div>
    <button id="connectBtn" onclick="connectWallet()"
        class="text-yellow-400 border border-yellow-500 px-3 py-1 rounded">
        CONNECT
    </button>
</header>

<main class="max-w-md mx-auto p-4">

<!-- INPUT -->
<div class="bg-zinc-900 p-4 rounded-xl mt-5">

    <p class="text-xs text-gray-400">From (SAMFI)</p>

    <input id="amount" type="number"
        class="w-full mt-2 p-2 bg-black border border-zinc-700 rounded text-right text-xl"
        placeholder="0"/>

    <p id="bal" class="text-xs text-gray-500 mt-2">0 SAMFI Balance</p>

</div>

<!-- BUTTON -->
<button onclick="swap()"
    class="w-full mt-4 bg-yellow-500 text-black font-bold py-3 rounded-xl">

    SWAP REAL

</button>

<!-- LOG -->
<div id="log" class="mt-4 text-xs text-gray-400 bg-zinc-900 p-3 rounded-xl h-32 overflow-y-auto">

[READY] SAM Finance DEX

</div>

</main>

<script>

const SAMFI = "0xAC9E151b4048b179Be0CbB23C0c6FC29419061a7";
const LP    = "0xbd5588aF3470B6bEbD969B82497c2a0F54168DD5";

let signer;

async function connectWallet(){

    if(!window.ethereum){
        alert("Install wallet");
        return;
    }

    const provider = new ethers.BrowserProvider(window.ethereum);
    signer = await provider.getSigner();

    const addr = await signer.getAddress();

    document.getElementById("connectBtn").innerText =
        addr.slice(0,6)+"..."+addr.slice(-4);

}

async function swap(){

    if(!signer){
        alert("Connect wallet dulu");
        return;
    }

    const amount = document.getElementById("amount").value;
    const log = document.getElementById("log");

    if(!amount || amount <= 0){
        alert("input amount");
        return;
    }

    try {

        log.innerHTML += "<br>[1] Approving SAMFI...";

        const erc20 = new ethers.Contract(SAMFI, [
            "function approve(address spender,uint amount) returns(bool)"
        ], signer);

        const tx1 = await erc20.approve(LP, ethers.parseEther(amount));
        await tx1.wait();

        log.innerHTML += "<br>[2] Swap executing...";

        const lp = new ethers.Contract(LP, [
            "function swap(uint amount0Out,uint amount1Out,address to)"
        ], signer);

        const user = await signer.getAddress();

        const tx2 = await lp.swap(
            0,
            ethers.parseEther(amount),
            user
        );

        await tx2.wait();

        log.innerHTML += "<br>✅ SWAP SUCCESS (ON-CHAIN)";

    } catch(e){

        console.log(e);
        log.innerHTML += "<br>❌ FAILED - LP mungkin butuh router logic";

    }
}

</script>

</body>

</html>
