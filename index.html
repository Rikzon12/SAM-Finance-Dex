<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SAM Finance DEX</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>

<style>
body { background:#000; color:white; font-family: monospace; }
</style>
</head>

<body>

<header class="p-4 border-b border-zinc-800 flex justify-between">
<div>SAM <span style="color:yellow">FINANCE</span></div>

<button id="connectBtn" onclick="connectWallet()"
class="border border-yellow-400 text-yellow-400 px-2 py-1 text-xs rounded">
CONNECT
</button>
</header>

<main class="max-w-md mx-auto p-4">

<div class="text-xs text-gray-400 mb-2">
zkLTC: <span id="nativeBal">0</span>
</div>

<div class="text-xs text-gray-400">
SAMFI: <span id="balSAMFI">0</span>
</div>

<div class="text-xs text-gray-400 mb-3">
WzkLTC: <span id="balWZK">0</span>
</div>

<!-- FROM -->
<div class="bg-zinc-900 p-3 rounded">

<div class="flex justify-between text-xs">
From
<select id="fromToken" class="bg-black border p-1 text-xs">
<option value="zkLTC">zkLTC</option>
<option value="WZK">WzkLTC</option>
<option value="SAMFI">SAMFI</option>
</select>
</div>

<input id="amount" type="number"
class="w-full mt-2 bg-black border p-2 text-right"
placeholder="0"/>

</div>

<div onclick="swapUI()" class="text-center text-yellow-400 my-3 cursor-pointer">
⇅
</div>

<!-- TO -->
<div class="bg-zinc-900 p-3 rounded">

<div class="flex justify-between text-xs">
To
<select id="toToken" class="bg-black border p-1 text-xs">
<option value="SAMFI">SAMFI</option>
<option value="WZK">WzkLTC</option>
<option value="zkLTC">zkLTC</option>
</select>
</div>

<input id="out" disabled
class="w-full mt-2 bg-black border p-2 text-right"/>

</div>

<button onclick="swap()"
class="w-full bg-yellow-500 text-black font-bold py-2 mt-4 rounded">
SWAP
</button>

<div id="log" class="text-xs mt-3"></div>

</main>

<script>

// ================= CONFIG =================
const ROUTER = "0xe351c47c3b96844F46e9808a7D5bBa8101BfFB57";
const SAMFI  = "0xAC9E151b4048b179Be0CbB23C0c6FC29419061a7";
const WZK    = "0x60A84eBC3483fEFB251B76Aea5B8458026Ef4bea";

let signer;
let provider;

// ================= ABI =================
const erc20Abi = [
"function approve(address,uint256) returns(bool)",
"function balanceOf(address) view returns(uint256)",
"function decimals() view returns(uint8)"
];

const routerAbi = [
"function swapExactTokensForTokens(uint256,uint256,address[],address,uint256)",
"function swapExactTokensForTokensSupportingFeeOnTransferTokens(uint256,uint256,address[],address,uint256)"
];

// ================= GRAPH =================
const GRAPH = {
"zkLTC": ["WZK"],
"WZK": ["zkLTC", "SAMFI"],
"SAMFI": ["WZK"]
};

// ================= FIND PATH =================
function findPath(from, to, visited = new Set()) {
if (from === to) return [from];

visited.add(from);

for (let n of (GRAPH[from] || [])) {
if (visited.has(n)) continue;

let p = findPath(n, to, visited);
if (p) return [from, ...p];
}

return null;
}

// ================= AMM (SIMPLIFIED) =================
let RESERVES = {
"WZK-SAMFI": { x: 1000000, y: 1000000000 }
};

function getAmountOut(amountIn, reserveIn, reserveOut){
const fee = 0.003;
const amtIn = amountIn * (1 - fee);
return (amtIn * reserveOut) / (reserveIn + amtIn);
}

// ================= MULTI HOP =================
function calc(amount, path){

let amt = parseFloat(amount);

for(let i=0;i<path.length-1;i++){

let a = path[i];
let b = path[i+1];

if((a==="WZK" && b==="SAMFI") || (a==="SAMFI" && b==="WZK")){

let pool = RESERVES["WZK-SAMFI"];

if(a==="WZK"){
amt = getAmountOut(amt, pool.x, pool.y);
} else {
amt = getAmountOut(amt, pool.y, pool.x);
}

}

}

return amt;
}

// ================= LOG =================
function setLog(msg,type="info"){

let el = document.getElementById("log");

let color="white";
if(type==="success") color="lightgreen";
if(type==="error") color="red";
if(type==="pending") color="orange";

el.innerHTML = `<span style="color:${color}">${msg}</span>`;
}

// ================= CONNECT =================
async function connectWallet(){

if(!window.ethereum) return alert("Install wallet");

provider = new ethers.BrowserProvider(window.ethereum);
signer = await provider.getSigner();

const addr = await signer.getAddress();

document.getElementById("connectBtn").innerText =
addr.slice(0,6)+"..."+addr.slice(-4);

loadAll();
setInterval(loadAll,5000);
}

// ================= LOAD BALANCE =================
async function loadAll(){

if(!signer) return;

const user = await signer.getAddress();

const sam = new ethers.Contract(SAMFI, erc20Abi, provider);
const wzk = new ethers.Contract(WZK, erc20Abi, provider);

const b1 = await sam.balanceOf(user);
const b2 = await wzk.balanceOf(user);
const b3 = await provider.getBalance(user);

document.getElementById("balSAMFI").innerText =
Number(ethers.formatEther(b1)).toFixed(4);

document.getElementById("balWZK").innerText =
Number(ethers.formatEther(b2)).toFixed(4);

document.getElementById("nativeBal").innerText =
Number(ethers.formatEther(b3)).toFixed(4);
}

// ================= UI SWAP =================
function swapUI(){

let a=document.getElementById("fromToken").value;
let b=document.getElementById("toToken").value;

document.getElementById("fromToken").value=b;
document.getElementById("toToken").value=a;

document.getElementById("out").value =
document.getElementById("amount").value || "";
}

// ================= LIVE QUOTE =================
document.getElementById("amount").addEventListener("input",(e)=>{

let amount=e.target.value;
let from=document.getElementById("fromToken").value;
let to=document.getElementById("toToken").value;

if(!amount) return;

let path=findPath(from,to);

if(!path){
document.getElementById("out").value="No route";
return;
}

let out=calc(amount,path);

document.getElementById("out").value=Number(out).toFixed(6);

});

// ================= SWAP CORE FIXED =================
async function swap(){

if(!signer) return alert("connect wallet");

let amount=document.getElementById("amount").value;
let from=document.getElementById("fromToken").value;
let to=document.getElementById("toToken").value;

let user=await signer.getAddress();

setLog("Processing...","pending");

try{

let path=findPath(from,to);

if(!path){
setLog("No route found","error");
return;
}

// wrap zkLTC
if(from==="zkLTC"){
await signer.sendTransaction({
to:WZK,
value:BigInt(Math.floor(amount*1e18))
});
path[0]="WZK";
}

// approve
const token=new ethers.Contract(path[0],erc20Abi,signer);
await token.approve(ROUTER,BigInt(Math.floor(amount*1e18)));

// router
const router=new ethers.Contract(ROUTER,routerAbi,signer);

const deadline=Math.floor(Date.now()/1000)+600;

let tx;

try{
tx=await router.swapExactTokensForTokensSupportingFeeOnTransferTokens(
BigInt(Math.floor(amount*1e18)),
0,
path,
user,
deadline
);
}catch(e){
tx=await router.swapExactTokensForTokens(
BigInt(Math.floor(amount*1e18)),
0,
path,
user,
deadline
);
}

setLog("Waiting confirmation...","pending");

await tx.wait();

setLog("SWAP SUCCESS","success");

loadAll();

}catch(e){

console.log(e);
setLog("SWAP FAILED (check liquidity / router)","error");

}

}

</script>

</body>
</html>
