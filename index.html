<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>SAM FINANCE</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>

<style>

body{
background:#000;
color:white;
font-family:monospace;
overflow-x:hidden;
}

/* SIDEBAR */
#sidebar{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100vh;
background:#050505;
border-right:1px solid #222;
transition:.3s;
z-index:999;
padding-top:90px;
}

#sidebar.active{
left:0;
}

.menuItem{
padding:20px;
border-bottom:1px solid #111;
font-size:22px;
}

.menuItem:hover{
background:#111;
}

/* CARD */
.dexCard{
border:1px solid #222;
border-radius:30px;
padding:20px;
background:#050505;
}

/* TOKEN BOX */
.tokenBox{
background:#030303;
border:1px solid #222;
border-radius:25px;
padding:20px;
}

/* INPUT */
.dexInput{
background:transparent;
border:none;
outline:none;
width:100%;
font-size:65px;
text-align:right;
color:white;
}

/* BUTTON */
.swapBtn{
background:#d9ff00;
color:black;
font-weight:bold;
width:100%;
padding:18px;
border-radius:20px;
margin-top:20px;
font-size:24px;
}

/* SWITCH */
.middleBtn{
width:75px;
height:75px;
border-radius:50%;
background:#111;
border:2px solid #333;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
margin:auto;
margin-top:-20px;
margin-bottom:-20px;
position:relative;
z-index:10;
cursor:pointer;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">

<div class="menuItem">SWAP</div>
<div class="menuItem">PORTFOLIO</div>
<div class="menuItem">LIQUIDITY</div>
<div class="menuItem">LOCKS</div>
<div class="menuItem">VOTES</div>
<div class="menuItem">INCENTIVES</div>

</div>

<!-- HEADER -->
<header class="flex items-center justify-between p-5 border-b border-zinc-800">

<div onclick="toggleMenu()"
class="text-5xl text-yellow-300 cursor-pointer">
☰
</div>

<div class="text-5xl font-bold text-yellow-300">
SAM FINANCE
</div>

<button id="connectBtn"
onclick="connectWallet()"
class="bg-zinc-900 px-5 py-4 rounded-2xl text-yellow-300 border border-zinc-700">

CONNECT

</button>

</header>

<!-- MAIN -->
<main class="max-w-md mx-auto p-4 mt-6">

<div class="dexCard">

<!-- FROM -->
<div class="tokenBox">

<div class="flex justify-between items-center mb-4">

<div class="text-gray-400 text-3xl">
Swap
</div>

<div class="flex gap-2">

<button onclick="setPercent(25)"
class="bg-zinc-700 px-3 py-2 rounded">
25%
</button>

<button onclick="setPercent(50)"
class="bg-zinc-700 px-3 py-2 rounded">
50%
</button>

<button onclick="setPercent(75)"
class="bg-zinc-700 px-3 py-2 rounded">
75%
</button>

<button onclick="setMax()"
class="bg-zinc-700 px-3 py-2 rounded">
MAX
</button>

</div>

</div>

<div class="flex justify-between items-center">

<select id="fromToken"
class="bg-black border border-zinc-700 px-4 py-3 rounded-xl text-3xl">

<option value="SAMFI">SAMFI</option>
<option value="WzkLTC">WzkLTC</option>

</select>

<input id="amount"
type="number"
placeholder="0"
class="dexInput"/>

</div>

<div class="mt-4 text-gray-400 text-2xl">
Balance:
<span id="fromBal">0</span>
</div>

</div>

<!-- SWITCH -->
<div onclick="switchTokens()" class="middleBtn">
⇅
</div>

<!-- TO -->
<div class="tokenBox pt-10">

<div class="text-gray-400 text-3xl mb-4">
For
</div>

<div class="flex justify-between items-center">

<select id="toToken"
class="bg-black border border-zinc-700 px-4 py-3 rounded-xl text-3xl">

<option value="WzkLTC">WzkLTC</option>
<option value="SAMFI">SAMFI</option>

</select>

<input id="out"
disabled
placeholder="0"
class="dexInput"/>

</div>

<div class="mt-4 text-gray-400 text-2xl">
Balance:
<span id="toBal">0</span>
</div>

</div>

<!-- ROUTE -->
<div class="mt-5 text-gray-400 text-xl">

Route:
<span id="routeText">
SAMFI → WzkLTC
</span>

</div>

<!-- IMPACT -->
<div class="mt-2 text-gray-400 text-xl">

Price Impact:
<span id="impact">
0%
</span>

</div>

<!-- BUTTON -->
<button onclick="swap()" class="swapBtn">
SWAP
</button>

<!-- STATUS -->
<div id="status"
class="mt-6 text-center text-xl text-gray-400">
READY
</div>

</div>

</main>

<script>

// ================= CONFIG =================
const ROUTER =
"0xd87fE5B8Bc2790f54bE4A2706c9b6Ed8b5a47539";

const SAMFI =
"0xAC9E151b4048b179Be0CbB23C0c6FC29419061a7";

const WzkLTC =
"0x60A84eBC3483fEFB251B76Aea5B8458026Ef4bea";

// ================= TOKENS =================
const TOKENS = {
SAMFI: SAMFI,
WzkLTC: WzkLTC
};

// ================= ABI =================
const erc20Abi = [
"function approve(address,uint256) returns(bool)",
"function balanceOf(address) view returns(uint256)"
];

const routerAbi = [

"function swapExactTokensForTokens(uint amountIn,uint amountOutMin,address[] calldata path,address to,uint deadline) external returns (uint[] memory amounts)",

"function getAmountsOut(uint amountIn,address[] memory path) public view returns (uint[] memory amounts)"

];

// ================= PROVIDER =================
let provider;
let signer;

// ================= MENU =================
function toggleMenu(){

document.getElementById("sidebar")
.classList.toggle("active");

}

// ================= CONNECT =================
async function connectWallet(){

if(!window.ethereum)
return alert("Install wallet");

provider =
new ethers.BrowserProvider(window.ethereum);

signer =
await provider.getSigner();

const addr =
await signer.getAddress();

document.getElementById("connectBtn")
.innerText =
addr.slice(0,6)+"..."+addr.slice(-4);

loadBalances();

setInterval(loadBalances,4000);

}

// ================= BALANCE =================
async function loadBalances(){

if(!signer) return;

const user =
await signer.getAddress();

const from =
document.getElementById("fromToken").value;

const to =
document.getElementById("toToken").value;

// FROM
const tokenFrom =
new ethers.Contract(
TOKENS[from],
erc20Abi,
provider
);

const balFrom =
await tokenFrom.balanceOf(user);

document.getElementById("fromBal")
.innerText =
parseFloat(
ethers.formatEther(balFrom)
).toFixed(4);

// TO
const tokenTo =
new ethers.Contract(
TOKENS[to],
erc20Abi,
provider
);

const balTo =
await tokenTo.balanceOf(user);

document.getElementById("toBal")
.innerText =
parseFloat(
ethers.formatEther(balTo)
).toFixed(4);

}

// ================= SWITCH =================
function switchTokens(){

const a =
document.getElementById("fromToken");

const b =
document.getElementById("toToken");

const temp = a.value;

a.value = b.value;
b.value = temp;

liveQuote();
loadBalances();

}

// ================= REAL QUOTE =================
async function liveQuote(){

if(!provider) return;

try{

const amount =
document.getElementById("amount").value;

const from =
document.getElementById("fromToken").value;

const to =
document.getElementById("toToken").value;

document.getElementById("routeText")
.innerText =
from + " → " + to;

if(!amount){

document.getElementById("out").value="";
return;

}

const router =
new ethers.Contract(
ROUTER,
routerAbi,
provider
);

const path = [
TOKENS[from],
TOKENS[to]
];

const amounts =
await router.getAmountsOut(
ethers.parseEther(amount),
path
);

const output =
ethers.formatEther(
amounts[1]
);

document.getElementById("out").value =
parseFloat(output).toFixed(6);

// fake simple impact visual
const impact =
(
(Math.random()*0.3)
).toFixed(2);

document.getElementById("impact")
.innerText =
impact+"%";

}catch(e){

console.log(e);

document.getElementById("out").value =
"0";

}

}

// ================= EVENTS =================
document.getElementById("amount")
.addEventListener("input",liveQuote);

document.getElementById("fromToken")
.addEventListener("change",()=>{

liveQuote();
loadBalances();

});

document.getElementById("toToken")
.addEventListener("change",()=>{

liveQuote();
loadBalances();

});

// ================= PERCENT =================
async function setPercent(p){

if(!signer) return;

const from =
document.getElementById("fromToken").value;

const user =
await signer.getAddress();

const token =
new ethers.Contract(
TOKENS[from],
erc20Abi,
provider
);

const bal =
await token.balanceOf(user);

const num =
parseFloat(
ethers.formatEther(bal)
);

document.getElementById("amount").value =
(num*(p/100)).toFixed(4);

liveQuote();

}

// ================= MAX =================
async function setMax(){

if(!signer) return;

const from =
document.getElementById("fromToken").value;

const user =
await signer.getAddress();

const token =
new ethers.Contract(
TOKENS[from],
erc20Abi,
provider
);

const bal =
await token.balanceOf(user);

document.getElementById("amount").value =
parseFloat(
ethers.formatEther(bal)
).toFixed(4);

liveQuote();

}

// ================= SWAP =================
async function swap(){

if(!signer)
return alert("connect wallet");

try{

document.getElementById("status")
.innerText =
"APPROVING...";

const amount =
document.getElementById("amount").value;

const from =
document.getElementById("fromToken").value;

const to =
document.getElementById("toToken").value;

const user =
await signer.getAddress();

const router =
new ethers.Contract(
ROUTER,
routerAbi,
signer
);

const path = [
TOKENS[from],
TOKENS[to]
];

// APPROVE
const token =
new ethers.Contract(
TOKENS[from],
erc20Abi,
signer
);

const txApprove =
await token.approve(
ROUTER,
ethers.parseEther(amount)
);

await txApprove.wait();

document.getElementById("status")
.innerText =
"SWAPPING...";

// SWAP
const tx =
await router.swapExactTokensForTokens(

ethers.parseEther(amount),
0,
path,
user,
Math.floor(Date.now()/1000)+600

);

document.getElementById("status")
.innerText =
"WAITING CONFIRMATION...";

await tx.wait();

document.getElementById("status")
.innerText =
"✅ SWAP SUCCESS";

loadBalances();
liveQuote();

}catch(e){

console.log(e);

document.getElementById("status")
.innerText =
"❌ SWAP FAILED";

}

}

</script>

</body>
</html>
