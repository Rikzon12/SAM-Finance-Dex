<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SAM Finance DEX</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>

<style>
body { background:#000; color:white; font-family: monospace; }
</style>
</head>

<body>

<header class="p-4 border-b border-zinc-800 flex justify-between">
<div>SAM <span style="color:yellow">FINANCE</span></div>

<button id="connectBtn" onclick="connectWallet()"
class="border border-yellow-400 text-yellow-400 px-2 py-1 text-xs rounded">
CONNECT
</button>
</header>

<main class="max-w-md mx-auto p-4">

<!-- BALANCE -->
<div class="text-xs text-gray-400 mb-3">
zkLTC: <span id="nativeBal">0</span>
</div>

<!-- FROM -->
<div class="bg-zinc-900 p-3 rounded">

<div class="flex justify-between text-xs">
From
<select id="fromToken" class="bg-black border p-1 text-xs">
<option value="zkLTC">zkLTC</option>
<option value="WZK">WzkLTC</option>
<option value="SAMFI">SAMFI</option>
</select>
</div>

<input id="amount" type="number"
class="w-full mt-2 bg-black border p-2 text-right"
placeholder="0"/>

</div>

<!-- SWAP ICON -->
<div onclick="swapUI()" class="text-center text-yellow-400 my-3 cursor-pointer">
⇅
</div>

<!-- TO -->
<div class="bg-zinc-900 p-3 rounded">

<div class="flex justify-between text-xs">
To
<select id="toToken" class="bg-black border p-1 text-xs">
<option value="SAMFI">SAMFI</option>
<option value="WZK">WzkLTC</option>
<option value="zkLTC">zkLTC</option>
</select>
</div>

<input id="out" disabled
class="w-full mt-2 bg-black border p-2 text-right"/>

</div>

<button onclick="swap()" class="w-full bg-yellow-500 text-black font-bold py-2 mt-4 rounded">
SWAP
</button>

<div id="log" class="text-xs mt-3 text-gray-300"></div>

</main>

<script>

// ================= CONFIG =================
const ROUTER = "0xe351c47c3b96844F46e9808a7D5bBa8101BfFB57";
const SAMFI  = "0xAC9E151b4048b179Be0CbB23C0c6FC29419061a7";
const WZK    = "0x60A84eBC3483fEFB251B76Aea5B8458026Ef4bea";

let signer;

// ================= ABI =================
const erc20Abi = [
"function approve(address,uint) returns(bool)",
"function balanceOf(address) view returns(uint)"
];

const routerAbi = [
"function swapExactTokensForTokens(uint,uint,address[],address,uint)"
];

// ================= CONNECT =================
async function connectWallet(){

if(!window.ethereum) return alert("Install wallet");

const provider = new ethers.BrowserProvider(window.ethereum);
signer = await provider.getSigner();

const addr = await signer.getAddress();

document.getElementById("connectBtn").innerText =
addr.slice(0,6)+"..."+addr.slice(-4);

loadNative();
}

// ================= NATIVE BALANCE =================
async function loadNative(){

const provider = new ethers.BrowserProvider(window.ethereum);
const user = await signer.getAddress();

const bal = await provider.getBalance(user);

document.getElementById("nativeBal").innerText =
parseFloat(ethers.formatEther(bal)).toFixed(4);
}

// ================= UI SWAP =================
function swapUI(){

let a = document.getElementById("fromToken").value;
let b = document.getElementById("toToken").value;

document.getElementById("fromToken").value = b;
document.getElementById("toToken").value = a;

document.getElementById("out").value =
document.getElementById("amount").value || "";
}

// ================= AUTO QUOTE (SAFE SIMPLIFIED) =================
// nanti bisa diganti real reserve on-chain
function getRate(from,to){

if(from==="zkLTC" && to==="SAMFI") return 8000;
if(from==="SAMFI" && to==="zkLTC") return 0.00012;

if(from==="WZK" && to==="SAMFI") return 10000;
if(from==="SAMFI" && to==="WZK") return 0.0001;

if(from==="zkLTC" && to==="WZK") return 1;
if(from==="WZK" && to==="zkLTC") return 1;

return 0;
}

// ================= LIVE PRICE =================
document.getElementById("amount").addEventListener("input", (e)=>{

const amount = e.target.value;
const from = document.getElementById("fromToken").value;
const to = document.getElementById("toToken").value;

if(!amount) return;

const rate = getRate(from,to);

document.getElementById("out").value =
(rate * amount).toFixed(6);

});

// ================= SWAP CORE =================
async function swap(){

if(!signer) return alert("connect wallet");

const amount = document.getElementById("amount").value;
const from = document.getElementById("fromToken").value;
const to = document.getElementById("toToken").value;

const user = await signer.getAddress();

let log = document.getElementById("log");
log.innerHTML = "processing...";

// ================= WRAP LOGIC =================
let tokenIn;

if(from === "zkLTC"){

// wrap native → WzkLTC
const tx = await signer.sendTransaction({
to: WZK,
value: ethers.parseEther(amount)
});

await tx.wait();

tokenIn = WZK;

} else if(from === "SAMFI") {
tokenIn = SAMFI;
} else {
tokenIn = WZK;
}

// ================= OUTPUT =================
const tokenOut =
to === "SAMFI" ? SAMFI :
to === "WZK" ? WZK : WZK;

// ================= APPROVE =================
if(tokenIn !== "NATIVE"){
const token = new ethers.Contract(tokenIn, erc20Abi, signer);
await token.approve(ROUTER, ethers.parseEther(amount));
}

// ================= ROUTER SWAP =================
const router = new ethers.Contract(ROUTER, routerAbi, signer);

const tx = await router.swapExactTokensForTokens(
ethers.parseEther(amount),
0,
[tokenIn, tokenOut],
user,
Math.floor(Date.now()/1000)+600
);

await tx.wait();

log.innerHTML = "✅ SWAP SUCCESS";

loadNative();

}

</script>

</body>
</html>
