<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>SAM FINANCE</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>

<style>

body{
background:#000;
color:white;
font-family:monospace;
overflow-x:hidden;
}

/* SIDEBAR */
#sidebar{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100vh;
background:#050505;
border-right:1px solid #222;
transition:0.3s;
z-index:999;
padding-top:90px;
}

#sidebar.active{
left:0;
}

.menuItem{
padding:20px;
border-bottom:1px solid #111;
font-size:22px;
cursor:pointer;
}

.menuItem:hover{
background:#111;
}

/* CARD */
.dexCard{
border:1px solid #333;
border-radius:24px;
padding:20px;
background:linear-gradient(to bottom,#080808,#050505);
}

/* TOKEN BOX */
.tokenBox{
background:#050505;
border:1px solid #333;
border-radius:20px;
padding:15px;
}

/* INPUT */
.dexInput{
background:transparent;
border:none;
outline:none;
width:100%;
font-size:42px;
text-align:right;
color:white;
}

/* BUTTON */
.swapBtn{
background:#d7ff00;
color:black;
font-weight:bold;
width:100%;
padding:16px;
border-radius:18px;
margin-top:20px;
font-size:18px;
}

/* SWITCH */
.middleBtn{
width:60px;
height:60px;
border-radius:50%;
background:#111;
border:2px solid #333;
display:flex;
align-items:center;
justify-content:center;
font-size:25px;
margin:auto;
margin-top:-15px;
margin-bottom:-15px;
position:relative;
z-index:10;
cursor:pointer;
}

</style>

</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">

<div class="menuItem">SWAP</div>
<div class="menuItem">PORTFOLIO</div>
<div class="menuItem">LIQUIDITY</div>
<div class="menuItem">LOCKS</div>
<div class="menuItem">VOTES</div>
<div class="menuItem">INCENTIVES</div>

</div>

<!-- HEADER -->
<header class="flex items-center justify-between p-5 border-b border-zinc-800">

<div onclick="toggleMenu()"
class="text-4xl text-yellow-300 cursor-pointer">

☰

</div>

<div class="text-3xl font-bold text-yellow-300">

SAM FINANCE

</div>

<button id="connectBtn"
onclick="connectWallet()"
class="bg-zinc-900 px-4 py-3 rounded-xl text-yellow-300 border border-zinc-700">

CONNECT

</button>

</header>

<!-- MAIN -->
<main class="max-w-md mx-auto p-4 mt-5">

<div class="dexCard">

<!-- FROM -->
<div class="tokenBox">

<div class="flex justify-between items-center mb-3">

<div class="text-gray-400 text-xl">
Swap
</div>

<div class="flex gap-2">

<button onclick="setPercent(25)"
class="bg-zinc-700 px-3 py-2 rounded">
25%
</button>

<button onclick="setPercent(50)"
class="bg-zinc-700 px-3 py-2 rounded">
50%
</button>

<button onclick="setPercent(75)"
class="bg-zinc-700 px-3 py-2 rounded">
75%
</button>

<button onclick="setMax()"
class="bg-zinc-700 px-3 py-2 rounded">
MAX
</button>

</div>

</div>

<div class="flex justify-between items-center gap-3">

<select id="fromToken"
class="bg-black border border-zinc-700 px-4 py-3 rounded-xl text-xl">

<option value="zkLTC">zkLTC</option>
<option value="WzkLTC">WzkLTC</option>
<option value="SAMFI">SAMFI</option>

</select>

<input id="amount"
type="number"
placeholder="0"
class="dexInput"/>

</div>

<div class="mt-4 text-gray-400">

Balance:
<span id="fromBal">0</span>

</div>

</div>

<!-- SWITCH -->
<div onclick="switchTokens()" class="middleBtn">

⇅

</div>

<!-- TO -->
<div class="tokenBox pt-8">

<div class="text-gray-400 text-xl mb-3">

For

</div>

<div class="flex justify-between items-center gap-3">

<select id="toToken"
class="bg-black border border-zinc-700 px-4 py-3 rounded-xl text-xl">

<option value="SAMFI">SAMFI</option>
<option value="WzkLTC">WzkLTC</option>
<option value="zkLTC">zkLTC</option>

</select>

<input id="out"
disabled
placeholder="0"
class="dexInput"/>

</div>

<div class="mt-4 text-gray-400">

Balance:
<span id="toBal">0</span>

</div>

</div>

<!-- INFO -->
<div class="mt-4 text-sm text-gray-400">

<div>
Route:
<span id="routeText">-</span>
</div>

<div class="mt-1">
Price Impact:
<span id="impact">0%</span>
</div>

</div>

<!-- BUTTON -->
<button onclick="swap()" class="swapBtn">

SWAP

</button>

<!-- STATUS -->
<div id="status"
class="mt-5 text-center text-sm text-gray-400">

READY

</div>

</div>

</main>

<script>

// ================= CONFIG =================
const ROUTER =
"0xd87fE5B8Bc2790f54bE4A2706c9b6Ed8b5a47539";

const SAMFI =
"0xAC9E151b4048b179Be0CbB23C0c6FC29419061a7";

const WzkLTC =
"0x60A84eBC3483fEFB251B76Aea5B8458026Ef4bea";

// ================= TOKENS =================
const TOKENS = {

zkLTC: WzkLTC,
WzkLTC: WzkLTC,
SAMFI: SAMFI

};

// ================= ABI =================
const erc20Abi = [

"function approve(address,uint256) returns(bool)",
"function balanceOf(address) view returns(uint256)"

];

const routerAbi = [

"function swapExactTokensForTokens(uint amountIn,uint amountOutMin,address[] calldata path,address to,uint deadline) external returns (uint[] memory amounts)",

"function swapExactETHForTokens(uint amountOutMin,address[] calldata path,address to,uint deadline) external payable returns (uint[] memory amounts)",

"function swapExactTokensForETH(uint amountIn,uint amountOutMin,address[] calldata path,address to,uint deadline) external returns (uint[] memory amounts)",

"function getAmountsOut(uint amountIn,address[] memory path) view returns (uint[] memory amounts)"

];

// ================= PROVIDER =================
let provider;
let signer;

// ================= MENU =================
function toggleMenu(){

document.getElementById("sidebar")
.classList.toggle("active");

}

// ================= CONNECT =================
async function connectWallet(){

if(!window.ethereum)
return alert("Install wallet");

provider =
new ethers.BrowserProvider(window.ethereum);

signer =
await provider.getSigner();

const addr =
await signer.getAddress();

document.getElementById("connectBtn")
.innerText =
addr.slice(0,6)+"..."+addr.slice(-4);

loadBalances();

setInterval(loadBalances,4000);

}

// ================= BALANCE =================
async function loadBalances(){

if(!signer) return;

const user =
await signer.getAddress();

const from =
document.getElementById("fromToken").value;

const to =
document.getElementById("toToken").value;

// FROM
if(from==="zkLTC"){

const native =
await provider.getBalance(user);

const token =
new ethers.Contract(
WzkLTC,
erc20Abi,
provider
);

const wrapped =
await token.balanceOf(user);

const total =
parseFloat(
ethers.formatEther(native)
) +
parseFloat(
ethers.formatEther(wrapped)
);

document.getElementById("fromBal")
.innerText =
total.toFixed(4);

}else{

const token =
new ethers.Contract(
TOKENS[from],
erc20Abi,
provider
);

const bal =
await token.balanceOf(user);

document.getElementById("fromBal")
.innerText =
parseFloat(
ethers.formatEther(bal)
).toFixed(4);

}

// TO
if(to==="zkLTC"){

const native =
await provider.getBalance(user);

const token =
new ethers.Contract(
WzkLTC,
erc20Abi,
provider
);

const wrapped =
await token.balanceOf(user);

const total =
parseFloat(
ethers.formatEther(native)
) +
parseFloat(
ethers.formatEther(wrapped)
);

document.getElementById("toBal")
.innerText =
total.toFixed(4);

}else{

const token =
new ethers.Contract(
TOKENS[to],
erc20Abi,
provider
);

const bal =
await token.balanceOf(user);

document.getElementById("toBal")
.innerText =
parseFloat(
ethers.formatEther(bal)
).toFixed(4);

}

}

// ================= SWITCH =================
function switchTokens(){

const a =
document.getElementById("fromToken");

const b =
document.getElementById("toToken");

const temp = a.value;

a.value = b.value;
b.value = temp;

liveQuote();
loadBalances();

}

// ================= LIVE QUOTE =================
async function liveQuote(){

if(!provider) return;

const amount =
document.getElementById("amount").value;

const from =
document.getElementById("fromToken").value;

const to =
document.getElementById("toToken").value;

if(!amount){

document.getElementById("out").value="";
return;

}

try{

const router =
new ethers.Contract(
ROUTER,
routerAbi,
provider
);

const path = [
TOKENS[from],
TOKENS[to]
];

document.getElementById("routeText")
.innerText =
from + " → " + to;

const amounts =
await router.getAmountsOut(
ethers.parseEther(amount),
path
);

const out =
ethers.formatEther(
amounts[1]
);

document.getElementById("out").value =
parseFloat(out).toFixed(6);

// fake impact simple
const impact =
(amount * 0.05).toFixed(2);

document.getElementById("impact")
.innerText =
impact + "%";

}catch(e){

console.log(e);

document.getElementById("out").value =
"0";

}

}

document.getElementById("amount")
.addEventListener("input",liveQuote);

document.getElementById("fromToken")
.addEventListener("change",()=>{

liveQuote();
loadBalances();

});

document.getElementById("toToken")
.addEventListener("change",()=>{

liveQuote();
loadBalances();

});

// ================= PERCENT =================
async function setPercent(p){

if(!signer) return;

const from =
document.getElementById("fromToken").value;

const user =
await signer.getAddress();

let total;

if(from==="zkLTC"){

const native =
await provider.getBalance(user);

const token =
new ethers.Contract(
WzkLTC,
erc20Abi,
provider
);

const wrapped =
await token.balanceOf(user);

total =
parseFloat(
ethers.formatEther(native)
) +
parseFloat(
ethers.formatEther(wrapped)
);

}else{

const token =
new ethers.Contract(
TOKENS[from],
erc20Abi,
provider
);

const bal =
await token.balanceOf(user);

total =
parseFloat(
ethers.formatEther(bal)
);

}

document.getElementById("amount").value =
(total*(p/100)).toFixed(4);

liveQuote();

}

// ================= MAX =================
async function setMax(){

if(!signer) return;

const from =
document.getElementById("fromToken").value;

const user =
await signer.getAddress();

let total;

if(from==="zkLTC"){

const native =
await provider.getBalance(user);

const token =
new ethers.Contract(
WzkLTC,
erc20Abi,
provider
);

const wrapped =
await token.balanceOf(user);

total =
parseFloat(
ethers.formatEther(native)
) +
parseFloat(
ethers.formatEther(wrapped)
);

}else{

const token =
new ethers.Contract(
TOKENS[from],
erc20Abi,
provider
);

const bal =
await token.balanceOf(user);

total =
parseFloat(
ethers.formatEther(bal)
);

}

document.getElementById("amount").value =
total.toFixed(4);

liveQuote();

}

// ================= SWAP =================
async function swap(){

if(!signer)
return alert("connect wallet");

try{

document.getElementById("status")
.innerText =
"PROCESSING...";

const amount =
document.getElementById("amount").value;

const from =
document.getElementById("fromToken").value;

const to =
document.getElementById("toToken").value;

if(!amount || amount <= 0){

alert("input amount");
return;

}

const user =
await signer.getAddress();

const router =
new ethers.Contract(
ROUTER,
routerAbi,
signer
);

const deadline =
Math.floor(Date.now()/1000)+600;

const path = [
TOKENS[from],
TOKENS[to]
];

// ================= zkLTC -> TOKEN =================
if(from==="zkLTC"){

document.getElementById("status")
.innerText =
"WRAPPING zkLTC...";

const tx =
await router.swapExactETHForTokens(

0,
path,
user,
deadline,

{
value: ethers.parseEther(amount)
}

);

document.getElementById("status")
.innerText =
"WAITING CONFIRMATION...";

await tx.wait();

}

// ================= TOKEN -> zkLTC =================
else if(to==="zkLTC"){

const token =
new ethers.Contract(
TOKENS[from],
erc20Abi,
signer
);

document.getElementById("status")
.innerText =
"APPROVING TOKEN...";

const txApprove =
await token.approve(
ROUTER,
ethers.parseEther(amount)
);

await txApprove.wait();

document.getElementById("status")
.innerText =
"UNWRAPPING zkLTC...";

const tx =
await router.swapExactTokensForETH(

ethers.parseEther(amount),
0,
path,
user,
deadline

);

document.getElementById("status")
.innerText =
"WAITING CONFIRMATION...";

await tx.wait();

}

// ================= TOKEN -> TOKEN =================
else{

const token =
new ethers.Contract(
TOKENS[from],
erc20Abi,
signer
);

document.getElementById("status")
.innerText =
"APPROVING TOKEN...";

const txApprove =
await token.approve(
ROUTER,
ethers.parseEther(amount)
);

await txApprove.wait();

document.getElementById("status")
.innerText =
"SWAPPING TOKENS...";

const tx =
await router.swapExactTokensForTokens(

ethers.parseEther(amount),
0,
path,
user,
deadline

);

document.getElementById("status")
.innerText =
"WAITING CONFIRMATION...";

await tx.wait();

}

document.getElementById("status")
.innerText =
"✅ SWAP SUCCESS";

document.getElementById("amount").value="";
document.getElementById("out").value="";

loadBalances();

}catch(e){

console.log(e);

document.getElementById("status")
.innerText =
"❌ SWAP FAILED";

}

}

</script>

</body>
</html>
