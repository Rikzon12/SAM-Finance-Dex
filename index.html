<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SAM Finance DEX</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Roboto Mono', monospace;
    background: #000;
    color: #e5e7eb;
}
</style>
</head>

<body>

<!-- HEADER -->
<header class="w-full bg-[#050505] border-b border-[#151515] px-4 py-3 flex justify-between items-center">

    <div class="font-bold">
        SAM <span class="text-yellow-400">FINANCE</span>
    </div>

    <button id="connectBtn"
        onclick="connectWallet()"
        class="bg-[#111] border border-yellow-400 text-yellow-400 px-4 py-2 rounded text-xs">

        CONNECT

    </button>

</header>

<!-- MAIN -->
<main class="max-w-md mx-auto p-4 mt-6">

    <!-- FROM -->
    <div class="bg-[#0b0b0b] border border-zinc-800 p-4 rounded-xl">

        <div class="flex justify-between text-xs text-gray-400">
            <span>From</span>
            <span>SAMFI</span>
        </div>

        <input id="inputAmount"
            type="number"
            class="w-full mt-3 bg-black border border-zinc-700 p-3 rounded text-right text-xl"
            placeholder="0"/>

        <p id="balA" class="text-xs text-gray-500 mt-2">Loading balance...</p>

    </div>

    <div class="text-center text-yellow-400 my-3">⇅</div>

    <!-- TO -->
    <div class="bg-[#0b0b0b] border border-zinc-800 p-4 rounded-xl">

        <div class="flex justify-between text-xs text-gray-400">
            <span>To</span>
            <span>zkLTC</span>
        </div>

        <input disabled
            id="outputAmount"
            class="w-full mt-3 bg-black border border-zinc-700 p-3 rounded text-right text-xl"
            placeholder="0"/>

        <p id="balB" class="text-xs text-gray-500 mt-2">Loading balance...</p>

    </div>

    <!-- SWAP BUTTON -->
    <button onclick="executeSwap()"
        class="w-full mt-5 bg-yellow-500 text-black font-bold py-4 rounded-xl">

        SWAP

    </button>

    <!-- LOG -->
    <div id="log"
        class="hidden mt-4 bg-[#0b0b0b] border border-zinc-800 p-3 rounded-xl text-xs h-32 overflow-y-auto">

        [SYSTEM READY]

    </div>

</main>

<script>

// ======================
// ADDRESS CONFIG
// ======================
const SAMFI = "0xAC9E151b4048b179Be0CbB23C0c6FC29419061a7";
const LP    = "0xbd5588aF3470B6bEbD969B82497c2a0F54168DD5";

let signer;

// ======================
// ABI
// ======================
const erc20Abi = [
    "function balanceOf(address) view returns(uint)",
    "function approve(address,uint) returns(bool)",
    "function decimals() view returns(uint8)"
];

const lpAbi = [
    "function swap(uint amount0Out,uint amount1Out,address to)"
];

// ======================
// CONNECT WALLET
// ======================
async function connectWallet() {

    if (!window.ethereum) {
        alert("Install wallet dulu");
        return;
    }

    const provider = new ethers.BrowserProvider(window.ethereum);
    signer = await provider.getSigner();

    const addr = await signer.getAddress();

    document.getElementById("connectBtn").innerText =
        addr.slice(0,6)+"..."+addr.slice(-4);

    loadBalances();
}

// ======================
// LOAD BALANCE
// ======================
async function loadBalances() {

    const user = await signer.getAddress();

    const token = new ethers.Contract(SAMFI, erc20Abi, signer);

    const bal = await token.balanceOf(user);

    document.getElementById("balA").innerText =
        parseFloat(ethers.formatEther(bal)).toFixed(4) + " SAMFI Balance";

    document.getElementById("balB").innerText =
        "zkLTC Balance (via wallet)";
}

// ======================
// AUTO OUTPUT
// ======================
document.addEventListener("input", (e) => {

    if (e.target.id === "inputAmount") {
        document.getElementById("outputAmount").value = e.target.value;
    }

});

// ======================
// SWAP FUNCTION
// ======================
async function executeSwap() {

    if (!signer) {
        alert("Connect wallet dulu");
        return;
    }

    const amount = document.getElementById("inputAmount").value;
    const log = document.getElementById("log");

    log.classList.remove("hidden");

    if (!amount || amount <= 0) {
        alert("Masukkan jumlah");
        return;
    }

    try {

        log.innerHTML += "<br>[1] Approve SAMFI...";

        const token = new ethers.Contract(SAMFI, erc20Abi, signer);

        const tx1 = await token.approve(LP, ethers.parseEther(amount.toString()));
        await tx1.wait();

        log.innerHTML += "<br>[2] Swap executing...";

        const lp = new ethers.Contract(LP, lpAbi, signer);

        const user = await signer.getAddress();

        const tx2 = await lp.swap(
            0,
            ethers.parseEther(amount.toString()),
            user
        );

        await tx2.wait();

        log.innerHTML += "<br>✅ SWAP SUCCESS";

        loadBalances();

    } catch (e) {

        console.log(e);

        log.innerHTML += "<br>❌ SWAP FAILED (LP butuh router / AMM logic)";
    }
}

</script>

</body>
</html>
