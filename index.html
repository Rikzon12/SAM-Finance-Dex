<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SAM Finance DEX</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Roboto Mono', monospace;
    background: #000;
}
</style>
</head>

<body class="text-white">

<header class="flex justify-between items-center p-4 border-b border-zinc-800">

    <div class="font-bold">
        SAM <span class="text-yellow-400">FINANCE</span>
    </div>

    <button id="connectBtn" onclick="connectWallet()"
        class="border border-yellow-400 text-yellow-400 px-3 py-1 rounded text-xs">
        CONNECT
    </button>

</header>

<main class="max-w-md mx-auto p-4">

<!-- FROM -->
<div class="bg-zinc-900 p-4 rounded-xl mt-5">

    <div class="flex justify-between text-xs text-gray-400">
        <span>From</span>

        <select id="tokenA" onchange="updateUI()"
            class="bg-black border border-zinc-700 text-xs p-1 rounded">
            <option value="SAMFI">SAMFI</option>
            <option value="WZK">zkLTC</option>
        </select>

    </div>

    <input id="amount" type="number"
        class="w-full mt-3 p-2 bg-black border border-zinc-700 rounded text-right text-xl"
        placeholder="0" />

    <p id="bal1" class="text-xs text-gray-500 mt-2">0</p>

</div>

<!-- SWAP ARROW -->
<div class="text-center text-yellow-400 my-3 cursor-pointer" onclick="swapTokens()">
    ⇅
</div>

<!-- TO -->
<div class="bg-zinc-900 p-4 rounded-xl">

    <div class="flex justify-between text-xs text-gray-400">
        <span>To</span>

        <select id="tokenB" onchange="updateUI()"
            class="bg-black border border-zinc-700 text-xs p-1 rounded">
            <option value="WZK">zkLTC</option>
            <option value="SAMFI">SAMFI</option>
        </select>

    </div>

    <input disabled id="out"
        class="w-full mt-3 p-2 bg-black border border-zinc-700 rounded text-right text-xl"
        placeholder="0" />

    <p id="bal2" class="text-xs text-gray-500 mt-2">0</p>

</div>

<button onclick="executeSwap()"
    class="w-full mt-5 bg-yellow-500 text-black font-bold py-3 rounded-xl">

    SWAP

</button>

<div id="log"
    class="hidden mt-4 bg-zinc-900 border border-zinc-800 p-3 rounded-xl text-xs h-32 overflow-y-auto">

    [SYSTEM READY]

</div>

</main>

<script>

// ======================
// CONFIG
// ======================
const ROUTER = "0xe351c47c3b96844F46e9808a7D5bBa8101BfFB57";
const SAMFI  = "0xAC9E151b4048b179Be0CbB23C0c6FC29419061a7";
const WZK    = "0x60A84eBC3483fEFB251B76Aea5B8458026Ef4bea";

let signer;

// ======================
let tokenA = "SAMFI";
let tokenB = "WZK";

// ======================
// ABI
// ======================
const erc20Abi = [
"function approve(address,uint) returns(bool)",
"function balanceOf(address) view returns(uint)"
];

const routerAbi = [
"function swapExactTokensForTokens(uint amountIn,uint amountOutMin,address[] path,address to,uint deadline)",
"function swapExactTokensForTokensSupportingFeeOnTransferTokens(uint amountIn,uint amountOutMin,address[] path,address to,uint deadline)"
];

// ======================
// WALLET
// ======================
async function connectWallet() {

if (!window.ethereum) return alert("Install wallet dulu");

const provider = new ethers.BrowserProvider(window.ethereum);
signer = await provider.getSigner();

const addr = await signer.getAddress();

document.getElementById("connectBtn").innerText =
addr.slice(0,6) + "..." + addr.slice(-4);

loadBalances();
}

// ======================
// BALANCE
// ======================
async function loadBalances() {

const user = await signer.getAddress();

const sam = new ethers.Contract(SAMFI, erc20Abi, signer);
const wzk = new ethers.Contract(WZK, erc20Abi, signer);

const b1 = await sam.balanceOf(user);
const b2 = await wzk.balanceOf(user);

document.getElementById("bal1").innerText =
parseFloat(ethers.formatEther(b1)).toFixed(4) + " SAMFI";

document.getElementById("bal2").innerText =
parseFloat(ethers.formatEther(b2)).toFixed(4) + " zkLTC";
}

// ======================
// SWAP UI LOGIC
// ======================
function swapTokens() {

let temp = tokenA;
tokenA = tokenB;
tokenB = temp;

document.getElementById("tokenA").value = tokenA;
document.getElementById("tokenB").value = tokenB;

updateUI();
}

function updateUI() {

document.getElementById("out").value =
document.getElementById("amount").value;
}

// ======================
// INPUT SYNC
// ======================
document.addEventListener("input", (e) => {

if (e.target.id === "amount") {
document.getElementById("out").value = e.target.value;
}

});

// ======================
// SWAP CORE
// ======================
async function executeSwap() {

const amount = document.getElementById("amount").value;
const log = document.getElementById("log");

log.classList.remove("hidden");

if (!signer) return alert("Connect wallet dulu");

try {

const user = await signer.getAddress();

const tokenIn = tokenA === "SAMFI" ? SAMFI : WZK;
const tokenOut = tokenB === "SAMFI" ? SAMFI : WZK;

log.innerHTML += "<br>[1] Approve...";

const token = new ethers.Contract(tokenIn, erc20Abi, signer);

const tx1 = await token.approve(
ROUTER,
ethers.parseEther(amount.toString())
);

await tx1.wait();

log.innerHTML += "<br>[2] Swap...";

const router = new ethers.Contract(ROUTER, routerAbi, signer);

const path = [tokenIn, tokenOut];

const deadline = Math.floor(Date.now() / 1000) + 600;

let tx;

try {

tx = await router.swapExactTokensForTokens(
ethers.parseEther(amount.toString()),
0,
path,
user,
deadline
);

} catch (e) {

tx = await router.swapExactTokensForTokensSupportingFeeOnTransferTokens(
ethers.parseEther(amount.toString()),
0,
path,
user,
deadline
);

}

await tx.wait();

log.innerHTML += "<br>✅ SUCCESS";

loadBalances();

} catch (e) {

console.log(e);
log.innerHTML += "<br>❌ FAILED";
}

}

</script>

</body>
</html>
