<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAM Finance - SAMFI DEX</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Roboto Mono', monospace;
            background: #000;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #eab308;
            border-radius: 10px;
        }
    </style>
</head>

<body class="min-h-screen text-[#e5e7eb] overflow-x-hidden pb-10">

<!-- HEADER -->
<header class="w-full bg-[#050505] border-b border-[#151515] px-4 py-3 flex justify-between items-center sticky top-0 z-50">

    <div class="flex items-center gap-3">

        <div class="flex items-center gap-2">
            <div class="w-6 h-6 rounded-full border-2 border-yellow-400 border-t-transparent animate-spin"></div>

            <span class="font-bold tracking-widest text-white">
                SAM <span class="text-yellow-400">FINANCE</span>
            </span>
        </div>

    </div>

    <button id="connectBtn"
        class="bg-[#111] border border-yellow-400/30 text-yellow-400 px-4 py-2 rounded-lg text-xs font-bold"
        onclick="connectWallet()">
        CONNECT
    </button>

</header>

<!-- MAIN -->
<main class="w-full max-w-lg mx-auto p-4 mt-5">

    <!-- SWAP -->
    <section class="space-y-4 mt-4">

        <!-- INPUT -->
        <div class="bg-[#070709] border border-zinc-800 p-4 rounded-xl">

            <div class="flex justify-between mb-3 text-[11px] text-zinc-500">
                <span>From</span>
            </div>

            <div class="flex justify-between items-center">

                <div class="flex items-center gap-2 bg-zinc-900 px-3 py-2 rounded-lg border border-zinc-800">
                    <div class="w-4 h-4 rounded-full bg-yellow-400"></div>
                    <span class="font-bold text-xs">SAMFI</span>
                </div>

                <input id="inputAmount" type="number" placeholder="0"
                    class="bg-transparent outline-none text-right text-2xl w-1/2">

            </div>

            <div id="samfiBalance" class="text-[11px] text-zinc-500 mt-2">
                0 SAMFI Balance
            </div>

        </div>

        <!-- SWITCH -->
        <div class="flex justify-center">
            <button onclick="reverseSwap()"
                class="bg-black border border-zinc-800 text-yellow-400 px-3 py-2 rounded-lg">
                ⇅
            </button>
        </div>

        <!-- OUTPUT -->
        <div class="bg-[#070709] border border-zinc-800 p-4 rounded-xl">

            <div class="flex justify-between mb-3 text-[11px] text-zinc-500">
                <span>To</span>
            </div>

            <div class="flex justify-between items-center">

                <div class="flex items-center gap-2 bg-zinc-900 px-3 py-2 rounded-lg border border-zinc-800">
                    <div class="w-4 h-4 rounded-full bg-sky-500"></div>
                    <span class="font-bold text-xs">zkLTC</span>
                </div>

                <input id="outputAmount" disabled
                    class="bg-transparent outline-none text-right text-2xl w-1/2 text-zinc-500">

            </div>

        </div>

        <!-- BUTTON -->
        <button onclick="executeSwap()"
            class="w-full py-4 rounded-xl bg-gradient-to-r from-yellow-500 to-yellow-600 text-black font-black text-xs">

            SWAP (SIMULATION)

        </button>

    </section>

</main>

<!-- Ethers -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>

<script>

let isConnected = false;

let tokenA = "SAMFI";
let tokenB = "zkLTC";

// CONTRACT
const SAMFI_CONTRACT = "0xAC9E151b4048b179Be0CbB23C0c6FC29419061a7";

const ERC20_ABI = [
    "function balanceOf(address owner) view returns (uint256)",
    "function decimals() view returns (uint8)"
];

// NETWORK
const LITVM_PARAMS = {
    chainId: "0x1159",
    chainName: "LitVM LiteForge",
    rpcUrls: ["https://liteforge.rpc.caldera.xyz/http"],
    nativeCurrency: {
        name: "zkLTC",
        symbol: "zkLTC",
        decimals: 18
    }
};

// UI
const input = document.getElementById("inputAmount");
const output = document.getElementById("outputAmount");

input.addEventListener("input", (e) => {
    output.value = e.target.value;
});

// GET BALANCE
async function getSAMFIBalance(wallet, provider) {
    const contract = new ethers.Contract(SAMFI_CONTRACT, ERC20_ABI, provider);
    const bal = await contract.balanceOf(wallet);
    const dec = await contract.decimals();
    return ethers.formatUnits(bal, dec);
}

// CONNECT
async function connectWallet() {

    const btn = document.getElementById("connectBtn");

    if (!window.ethereum) {
        alert("Install MetaMask");
        return;
    }

    const accounts = await window.ethereum.request({
        method: "eth_requestAccounts"
    });

    const wallet = accounts[0];

    const provider = new ethers.BrowserProvider(window.ethereum);

    const balance = await getSAMFIBalance(wallet, provider);

    const short = wallet.slice(0,6) + "..." + wallet.slice(-4);

    btn.innerText = short;

    document.getElementById("samfiBalance").innerText =
        balance + " SAMFI Balance";

    isConnected = true;
}

// SWAP (still simulation)
function executeSwap() {

    if (!isConnected) {
        alert("Connect wallet first");
        return;
    }

    alert("Swap simulation success (DEX router not connected yet)");
}

function reverseSwap() {
    let temp = tokenA;
    tokenA = tokenB;
    tokenB = temp;
}

</script>

</body>
</html>
