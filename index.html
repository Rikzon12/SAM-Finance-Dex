<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>SAM Finance - LitVM Hub</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <style>

        body {
            font-family: 'Roboto Mono', monospace;
            background-color: #000000;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #eab308;
            border-radius: 10px;
        }

        @keyframes spinSlow {

            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .animate-spin-slow {
            animation: spinSlow 3s linear infinite;
        }

    </style>
</head>

<body class="min-h-screen text-[#e5e7eb] flex flex-col justify-start relative overflow-x-hidden pb-10">

    <!-- HEADER -->
    <header class="w-full bg-[#050505] border-b border-[#151515] px-4 py-3 flex justify-between items-center z-30 sticky top-0">

        <div class="flex items-center gap-4">

            <button class="text-yellow-400 focus:outline-none" onclick="toggleMenu()">

                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">

                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 6h16M4 12h16M4 18h16"></path>

                </svg>

            </button>

            <div class="flex items-center gap-2">

                <div class="w-6 h-6 rounded-full border-2 border-yellow-400 border-t-transparent animate-spin-slow flex items-center justify-center">

                    <div class="w-2 h-2 bg-yellow-400 rounded-full"></div>

                </div>

                <span class="text-md font-bold tracking-widest text-white">

                    SAM <span class="text-yellow-400">FINANCE</span>

                </span>

            </div>

        </div>

        <button
            id="connectBtn"
            onclick="connectWallet()"
            class="bg-[#111111] hover:bg-[#1a1a1a] border border-yellow-400/40 text-yellow-400 px-4 py-1.5 rounded-lg text-xs font-bold tracking-wider transition-all uppercase active:scale-95">

            Connect

        </button>

    </header>

    <!-- SIDEBAR -->
    <div
        id="sideMenu"
        class="fixed inset-0 bg-black/95 z-20 pt-20 px-6 hidden flex-col gap-5 text-center text-sm font-semibold tracking-widest uppercase">

        <a href="#" class="text-yellow-400 py-2 border-b border-zinc-900" onclick="switchTab('swap')">

            SWAP

        </a>

        <a href="#" class="text-zinc-400 hover:text-white py-2 border-b border-zinc-900" onclick="switchTab('liquidity')">

            LIQUIDITY

        </a>

        <a href="#" class="text-zinc-400 hover:text-white py-2 border-b border-zinc-900" onclick="switchTab('votes')">

            VOTES

        </a>

        <button
            onclick="toggleMenu()"
            class="bg-zinc-900 border border-zinc-800 text-zinc-400 py-2 rounded-lg text-xs tracking-wider font-bold mt-4">

            ❌ TUTUP MENU

        </button>

    </div>

    <!-- MAIN -->
    <main class="w-full max-w-lg mx-auto p-4 mt-6 z-10 flex flex-col gap-4">

        <!-- SUB NAV -->
        <div
            id="swapSubNav"
            class="flex gap-4 border-b border-zinc-900 pb-2 text-xs font-bold tracking-wider text-zinc-500">

            <button class="text-white border-b-2 border-yellow-400 pb-2">

                Swap

            </button>

            <button class="hover:text-zinc-300">

                TWAP

            </button>

            <button class="hover:text-zinc-300">

                Limit

            </button>

            <div class="ml-auto text-[11px] text-zinc-400 bg-zinc-900/60 px-2 py-0.5 rounded-md border border-zinc-800">

                1% Slippage ⚙️

            </div>

        </div>

        <!-- SWAP -->
        <section id="swapSection" class="block space-y-3">

            <!-- FROM -->
            <div class="bg-[#070709] border border-zinc-800/80 p-4 rounded-xl relative">

                <div class="flex justify-between text-[11px] text-zinc-500 mb-2">

                    <span>Swap</span>

                    <div class="flex gap-2 font-bold text-yellow-400/80">

                        <span>25%</span>
                        <span>50%</span>
                        <span>75%</span>
                        <span>Max</span>

                    </div>

                </div>

                <div class="flex justify-between items-center">

                    <div class="flex items-center gap-2 bg-zinc-900/80 px-3 py-1.5 rounded-lg border border-zinc-800">

                        <div class="w-4 h-4 bg-yellow-400 rounded-full"></div>

                        <span class="text-xs font-bold text-white">

                            SAM

                        </span>

                    </div>

                    <input
                        type="number"
                        id="inputAmount"
                        placeholder="0"
                        class="bg-transparent text-right text-2xl outline-none w-1/2 font-medium text-white placeholder-zinc-800">

                </div>

                <div class="text-[11px] text-zinc-500 mt-2">

                    0 SAM Balance

                </div>

            </div>

            <!-- SWITCH -->
            <div class="flex justify-center -my-6 relative z-10">

                <div class="bg-[#000000] border-2 border-zinc-800 p-2 rounded-lg text-yellow-400">

                    ⇅

                </div>

            </div>

            <!-- TO -->
            <div class="bg-[#070709] border border-zinc-800/80 p-4 rounded-xl mt-1">

                <div class="flex justify-between text-[11px] text-zinc-500 mb-2">

                    <span>For</span>

                    <span class="text-zinc-400">

                        Token Amount

                    </span>

                </div>

                <div class="flex justify-between items-center">

                    <div class="flex items-center gap-2 bg-zinc-900/80 px-3 py-1.5 rounded-lg border border-zinc-800">

                        <div class="w-4 h-4 bg-sky-500 rounded-full"></div>

                        <span class="text-xs font-bold text-white">

                            zkLTC

                        </span>

                    </div>

                    <input
                        type="number"
                        id="outputAmount"
                        placeholder="0"
                        disabled
                        class="bg-transparent text-right text-2xl outline-none w-1/2 font-medium text-zinc-600">

                </div>

                <div
                    id="zkltcBalance"
                    class="text-[11px] text-zinc-500 mt-2">

                    0 zkLTC Balance

                </div>

            </div>

            <!-- INFO -->
            <div class="border-l-2 border-yellow-400 bg-zinc-900/20 p-3 rounded-r-lg space-y-2 text-[11px] text-zinc-400 leading-relaxed font-mono">

                <div>

                    [1] Masukkan jumlah token swap.

                </div>

                <div>

                    [2] Network:
                    LitVM LiteForge Testnet

                </div>

            </div>

            <!-- BUTTON -->
            <button
                onclick="executeSwap()"
                class="w-full py-3.5 bg-gradient-to-r from-yellow-500 to-yellow-600 text-black font-black text-xs tracking-widest uppercase rounded-lg">

                APPROVE & SWAP

            </button>

        </section>

        <!-- LOG -->
        <div
            id="logConsole"
            class="w-full bg-[#030303] border border-zinc-900 rounded-xl p-3 text-[10px] font-mono text-zinc-600 hidden h-24 overflow-y-auto mt-2">

            <span class="text-yellow-500">

                [SAM-System]: Network Core Active...

            </span>

        </div>

    </main>

    <!-- ETHERS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.min.js"></script>

    <script>

        let isConnected = false;

        // ======================================
        // LITVM NETWORK
        // ======================================

        const LITVM_PARAMS = {

            chainId: "0x1159",

            chainName: "LitVM LiteForge",

            rpcUrls: [
                "https://liteforge.rpc.caldera.xyz/http"
            ],

            nativeCurrency: {
                name: "zkLTC",
                symbol: "zkLTC",
                decimals: 18
            },

            blockExplorerUrls: [
                "https://liteforge.explorer.caldera.xyz"
            ]
        };

        // ======================================
        // AUTO INPUT MIRROR
        // ======================================

        const input =
            document.getElementById("inputAmount");

        const output =
            document.getElementById("outputAmount");

        input.addEventListener("input", (e) => {

            output.value = e.target.value;

        });

        // ======================================
        // MENU
        // ======================================

        function toggleMenu() {

            const menu =
                document.getElementById("sideMenu");

            menu.classList.toggle("hidden");

            menu.classList.toggle("flex");

        }

        // ======================================
        // TAB
        // ======================================

        function switchTab(tabName) {

            toggleMenu();

        }

        // ======================================
        // CONNECT WALLET
        // ======================================

        async function connectWallet() {

            const btn =
                document.getElementById("connectBtn");

            const log =
                document.getElementById("logConsole");

            try {

                // CHECK WALLET
                if (!window.ethereum) {

                    alert(
                        "Gunakan MetaMask / OKX / Rabby Wallet"
                    );

                    return;
                }

                // CONNECT
                const accounts =
                    await window.ethereum.request({

                        method: "eth_requestAccounts"

                    });

                const address = accounts[0];

                // ADD NETWORK
                await window.ethereum.request({

                    method: "wallet_addEthereumChain",

                    params: [LITVM_PARAMS]

                });

                // GET BALANCE
                const provider =
                    new ethers.providers.Web3Provider(window.ethereum);

                const balanceWei =
                    await provider.getBalance(address);

                const balance =
                    ethers.utils.formatEther(balanceWei);

                // UI
                isConnected = true;

                btn.innerText =
                    address.slice(0, 6)
                    + "..."
                    + address.slice(-4);

                btn.classList.remove(
                    "bg-[#111111]",
                    "text-yellow-400"
                );

                btn.classList.add(
                    "bg-green-500",
                    "text-black"
                );

                // BALANCE
                document.getElementById(
                    "zkltcBalance"
                ).innerText =
                    parseFloat(balance).toFixed(4)
                    + " zkLTC Balance";

                // LOG
                log.classList.remove("hidden");

                log.innerHTML += `
                <br>
                <span class="text-emerald-400">
                [CONNECTED] ${address}
                </span>
                `;

            } catch (err) {

                console.log(err);

                alert(
                    "Koneksi wallet gagal"
                );

            }
        }

        // ======================================
        // SWAP
        // ======================================

        function executeSwap() {

            if (!isConnected) {

                alert(
                    "Hubungkan wallet terlebih dahulu!"
                );

                return;
            }

            const val =
                parseFloat(input.value);

            if (!val || val <= 0) {

                alert(
                    "Masukkan nominal swap!"
                );

                return;
            }

            const log =
                document.getElementById("logConsole");

            log.classList.remove("hidden");

            log.innerHTML += `
            <br>
            <span class="text-yellow-400">
            [TX] Processing ${val} SAM...
            </span>
            `;

            setTimeout(() => {

                log.innerHTML += `
                <br>
                <span class="text-emerald-400">
                [SUCCESS] Swap Completed
                </span>
                `;

            }, 1500);
        }

    </script>

</body>
</html>
